<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为文章标题</title>
</head>
<body>

<!-- 全文容器 -->
<div style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; line-height: 1.8; color: #2c1810; padding: 0;">

  <!-- Chrome -->
  <div style="padding: 28px 0 20px; border-bottom: 1px solid rgba(44,24,16,0.10); display: flex; justify-content: space-between; align-items: baseline;">
    <span style="font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #7a7680;">[必填] 左侧标签</span>
    <span style="font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #7a7680;">[必填] YYYY.MM.DD</span>
  </div>

  <!-- Article -->
  <main style="padding: 48px 0 72px;">

    <!-- Cover Section -->
    <div style="font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: #c4a265; margin-bottom: 20px;">[必填] KICKER 标签</div>

    <h1 style="font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif; font-weight: 900; font-size: clamp(32px, 6vw, 52px); line-height: 1.12; letter-spacing: -0.03em; color: #2c1810; margin-bottom: 28px;">[必填] 文章标题</h1>

    <p style="font-family: 'Noto Serif SC', 'Songti SC', serif; font-size: 17px; line-height: 1.86; color: #5c3a2e; padding-bottom: 24px; margin-bottom: 36px; border-bottom: 1px solid rgba(44,24,16,0.10);">[必填] 引言/摘要</p>

    <!-- Opening -->
    <div>
      <p style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; font-size: 17px; line-height: 2; color: rgba(44,24,16,0.85); margin-bottom: 20px;">[必填] 开头正文...</p>
    </div>

    <!-- Ghost（可选） -->
    <div style="font-family: 'Playfair Display', 'Noto Serif SC', serif; font-weight: 900; font-size: clamp(80px, 18vw, 180px); line-height: 0.85; letter-spacing: -0.06em; color: rgba(184,97,74,0.08); text-align: center; margin: 40px 0; user-select: none;">[必填] 数字或关键词</div>

    <!-- 章节标题 -->
    <div style="font-family: 'Noto Serif SC', 'Songti SC', serif; font-weight: 700; font-size: clamp(22px, 3.5vw, 30px); line-height: 1.3; letter-spacing: -0.02em; color: #5c3a2e; margin: 48px 0 24px; padding-top: 32px; border-top: 1px solid rgba(44,24,16,0.10);">[必填] 章节标题</div>

    <!-- 正文 -->
    <div>
      <p style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; font-size: 17px; line-height: 2; color: rgba(44,24,16,0.85); margin-bottom: 20px;">[必填] 正文内容...</p>
    </div>

    <!-- Pull Quote（引用） -->
    <div style="font-family: 'Noto Serif SC', 'Songti SC', serif; font-weight: 600; font-size: clamp(22px, 3.2vw, 28px); line-height: 1.5; color: #8b2e3b; padding: 36px 32px; margin: 40px 0; border-left: 3px solid #8b2e3b; background: rgba(139,46,59,0.04);">[必填] 金句内容...</div>

    <!-- Vision Block（洞察框） -->
    <div style="margin: 48px 0; padding: 32px; border: 1px solid rgba(44,24,16,0.10); border-left: 3px solid #c4a265;">
      <div style="font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #c4a265; margin-bottom: 20px;">[必填] LABEL</div>
      <p style="font-family: 'Noto Serif SC', 'Songti SC', serif; font-size: 18px; line-height: 1.9; color: #5c3a2e; margin-bottom: 16px;">[必填] 洞察内容...</p>
    </div>

    <!-- Timeline（时间线） -->
    <div style="margin: 40px 0;">
      <div style="display: flex; gap: 20px; margin-bottom: 28px; align-items: flex-start;">
        <span style="font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; letter-spacing: 0.12em; color: #b8614a; min-width: 80px; padding-top: 4px; text-transform: uppercase;">[必填] 日期</span>
        <span style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; font-size: 16px; line-height: 1.8; color: rgba(44,24,16,0.78); flex: 1; padding-left: 20px; border-left: 1px solid rgba(44,24,16,0.10);">[必填] 时间线内容...</span>
      </div>
    </div>

    <!-- Quote（居中引用） -->
    <div style="font-family: 'Noto Serif SC', 'Songti SC', serif; font-size: clamp(20px, 3vw, 26px); line-height: 1.6; color: #5c3a2e; padding: 32px 0; margin: 36px 0; border-top: 1px solid rgba(44,24,16,0.10); border-bottom: 1px solid rgba(44,24,16,0.10); text-align: center;">[必填] 居中金句...</div>

    <!-- Closing -->
    <div style="font-family: 'Noto Serif SC', 'Songti SC', serif; font-weight: 700; font-size: clamp(20px, 3vw, 26px); line-height: 1.5; color: #b8614a; text-align: center; padding: 48px 0 32px; border-top: 1px solid rgba(44,24,16,0.10);">[必填] 结束语...</div>

  </main>

  <!-- Footer -->
  <div style="padding: 24px 0 28px; border-top: 1px solid rgba(44,24,16,0.10); display: flex; justify-content: space-between; align-items: center;">
    <span style="font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #7a7680;">[必填] 左侧标签</span>
    <span style="font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #7a7680;">[必填] 右侧标签</span>
  </div>

</div>

</body>
</html>
